# PocketBase Docker Compose for RoboKids Vietnam
# Usage:
#   Local development: docker compose up -d
#   With logs: docker compose up
#   Stop: docker compose down

services:
  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
    container_name: robokids-pocketbase
    restart: unless-stopped
    ports:
      - "3200:8090"
    volumes:
      - ./pb_data:/app/pb_data
      - ./pb_migrations:/app/pb_migrations
    environment:
      - POCKETBASE_DATA_DIR=/app/pb_data
      - POCKETBASE_MIGRATIONS_DIR=/app/pb_migrations
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
