# fly.toml app configuration file generated for robokids-pocketbase on 2026-04-16T17:44:53+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'robokids-pocketbase'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile.pocketbase'

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[checks]
  [checks.pocketbase]
    type = "http"
    port = 8090
    path = "/api/health"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
