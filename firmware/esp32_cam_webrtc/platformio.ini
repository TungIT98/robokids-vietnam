; PlatformIO Configuration for ESP32-CAM WebRTC
; RoboKids Vietnam - v2.0

[env:esp32-cam]
platform = espressif32
board = esp32dev
framework = arduino

; Flash and PSRAM settings for ESP32-CAM
board_build.flash_mode = dio
board_build.partitions = default.csv
board_build.arduino.memory_type = qio_opi

; Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=4
    -DBOARD_HAS_PSRAM

; WiFi credentials (override in local.h or environment)
; -DWIFI_SSID=\"RoboKids_Lab\"
; -DWIFI_PASS=\"robokids2024\"

; Library dependencies
lib_deps =
    esp32-camera
    ${sysenv.PIO_LIBDEPS_DIR} ; Built-in WebServer, WebSocket included in ESP32 core
