# Windmill Self-Hosted Deployment for RoboKids Vietnam
# Based on official Windmill docker-compose

version: "3.9"

services:
  windmill:
    image: ghcr.io/windmill-labs/windmill:latest
    container_name: robokids-windmill
    restart: unless-stopped
    ports:
      - "3010:8000"     # Windmill UI/API (mapped to avoid port 8000 conflict)
    environment:
      - DATABASE_URL=postgresql://windmill:windmill@postgres:5432/windmill
      - REDIS_URL=redis://redis:6379
      - ENCRYPTION_KEY=your-encryption-key-change-in-production
      - NUXT_PUBLIC_DASHBOARD_URL=http://localhost:3000
      - LICENSE_KEY=  # Add license key if needed
    volumes:
      - windmill_data:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - windmill-network

  postgres:
    image: postgres:15-alpine
    container_name: robokids-windmill-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=windmill
      - POSTGRES_USER=windmill
      - POSTGRES_PASSWORD=windmill
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U windmill -d windmill"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - windmill-network

  redis:
    image: redis:7-alpine
    container_name: robokids-windmill-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - windmill-network

volumes:
  windmill_data:
  postgres_data:
  redis_data:

networks:
  windmill-network:
    driver: bridge