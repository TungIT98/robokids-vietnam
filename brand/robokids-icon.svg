<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- RoboKids Vietnam - Simplified Icon (Robot Head Only) -->
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#1976D2"/>
    </linearGradient>
  </defs>

  <!-- Robot Head Background -->
  <rect x="10" y="15" width="60" height="50" rx="12" fill="url(#iconGradient)"/>

  <!-- Robot Eyes -->
  <circle cx="30" cy="35" r="8" fill="#FFFFFF"/>
  <circle cx="50" cy="35" r="8" fill="#FFFFFF"/>
  <circle cx="32" cy="36" r="4" fill="#0D47A1"/>
  <circle cx="52" cy="36" r="4" fill="#0D47A1"/>

  <!-- Robot Smile -->
  <path d="M 28 48 Q 40 58 52 48" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Robot Antenna -->
  <line x1="40" y1="15" x2="40" y2="5" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
  <circle cx="40" cy="3" r="4" fill="#FFEB3B"/>
</svg>