name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  # STACK-2026: Production env vars - set here for CI/CD build
  VITE_POCKETBASE_URL: "https://robokids-pocketbase.fly.dev"
  VITE_API_URL: "https://robokids-api-production.thanhtungtran364.workers.dev"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: platform/client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: platform/client

      - name: Build with production env vars
        run: npm run build
        working-directory: platform/client
        env:
          VITE_POCKETBASE_URL: ${{ env.VITE_POCKETBASE_URL }}
          VITE_API_URL: ${{ env.VITE_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: platform/client
          command: pages deploy dist --project-name=robokids

  preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: platform/client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: platform/client

      - name: Build with production env vars
        run: npm run build
        working-directory: platform/client
        env:
          VITE_POCKETBASE_URL: ${{ env.VITE_POCKETBASE_URL }}
          VITE_API_URL: ${{ env.VITE_API_URL }}

      - name: Deploy Preview to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: platform/client
          command: pages deploy dist --project-name=robokids --branch=preview
